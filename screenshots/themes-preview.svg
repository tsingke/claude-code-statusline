<svg xmlns="http://www.w3.org/2000/svg" width="860" height="620" viewBox="0 0 860 620">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; }
    .title { font-size: 18px; font-weight: bold; fill: #e0e0e0; }
    .label { font-size: 14px; font-weight: bold; }
    .desc { font-size: 11px; fill: #888; }
    .sep { fill: #555; }
    .legend-label { font-size: 10px; fill: #aaa; }
