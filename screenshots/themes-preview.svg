  <rect width="860" height="620" rx="12" fill="#1a1b26"/>

  <!-- Title -->
  <text x="30" y="40" class="title">Claude Code Statusline — 5 种主题配色预览</text>
  <text x="30" y="58" class="desc">深色终端背景下的视觉效果对比</text>

  <!-- ===== Theme 1: default ===== -->
  <rect x="20" y="75" width="820" height="90" rx="8" fill="#12131e"/>
  <rect x="20" y="75" width="820" height="34" rx="8" fill="none" stroke="#2a2b3e" stroke-width="1"/>
  <rect x="20" y="109" width="820" height="0" fill="none" stroke="#2a2b3e" stroke-width="1"/>
  <text x="30" y="97" class="label" fill="#cd00cd">default</text>
  <text x="130" y="97" class="desc">Original — 品红 model / 蓝色 dir / 三色上下文</text>

  <!-- Status bar line -->
