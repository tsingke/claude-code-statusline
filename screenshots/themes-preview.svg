  <text x="540" y="138" class="sep">|</text>
  <text x="552" y="138" font-size="13" fill="#666" font-style="italic">think</text>
  <text x="600" y="138" class="sep">|</text>
  <text x="612" y="138" font-size="13" fill="#00cdcd">high</text>

